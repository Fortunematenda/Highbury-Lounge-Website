# Local D1 migrations only:
# npx wrangler d1 migrations apply highbury-lounge-d1 --local --config wrangler.migrate.toml --persist-to .wrangler/state
name = "highbury-lounge"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "highbury-lounge-d1"
database_id = "00000000-0000-4000-8000-000000000000"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "highbury-lounge-uploads"
